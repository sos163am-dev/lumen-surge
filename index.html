<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>SUNBURST</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;background:#020611;color:#fff;font-family:system-ui,Arial}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none}.box{background:#071426c9;border:1px solid #ffffff25;border-radius:14px;padding:8px 11px;backdrop-filter:blur(9px)}.v{font-weight:900;font-size:18px}.s{font-size:10px;color:#9fc0d8;text-transform:uppercase;letter-spacing:.12em}.controls{position:fixed;left:12px;right:12px;bottom:max(14px,env(safe-area-inset-bottom));display:flex;justify-content:space-between}.g{display:flex;gap:9px}.b{width:58px;height:58px;border-radius:17px;border:1px solid #ffffff30;background:#061426d9;color:#fff;font-size:25px;font-weight:900}.sun{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fffbd5,#ffc23b 55%,#723000);color:#321500}.ov{position:fixed;inset:0;display:grid;place-items:center;padding:20px;background:#020611d9;backdrop-filter:blur(7px)}.hide{display:none}.card{width:min(600px,100%);text-align:center;padding:28px;border-radius:28px;background:linear-gradient(145deg,#14344d,#061326);border:1px solid #7be8ff55;box-shadow:0 25px 90px #000}.k{font-size:11px;color:#86efff;letter-spacing:.2em;text-transform:uppercase;font-weight:900}h1{font-size:clamp(45px,13vw,82px);line-height:.9;margin:12px 0;letter-spacing:-.06em}p{color:#b3c9d8;line-height:1.5}.levels{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}.lvl,.main{border:0;border-radius:17px;padding:16px 14px;font-size:16px;font-weight:900;background:linear-gradient(135deg,#b8f7ff,#fff0aa);color:#07121d}.lvl:nth-child(2){background:linear-gradient(135deg,#b5c8ff,#d4ffef)}.msg{position:fixed;top:22%;left:50%;transform:translateX(-50%);background:#061426e8;border:1px solid #ffffff25;border-radius:14px;padding:10px 15px;opacity:0;font-weight:900;white-space:nowrap}@media(max-width:600px){.levels{grid-template-columns:1fr}.title{display:none}.b{width:54px;height:54px}.sun{width:66px;height:66px}}</style></head><body><canvas id="c"></canvas><div id="hud" class="hud hide"><div class="box"><div class="s" id="objLabel">Свет</div><div class="v"><span id="score">0</span>/<span id="goal">8</span></div></div><div class="box title"><div class="s">SUNBURST</div><div class="v" id="world">Элион</div></div><div class="box"><div class="s">Жизнь</div><div class="v" id="hp">♥♥♥</div></div></div><div id="controls" class="controls hide"><div class="g"><button class="b" id="L">←</button><button class="b" id="R">→</button></div><div class="g"><button class="b" id="J">↑</button><button class="b sun" id="S">☀</button></div></div><div id="msg" class="msg"></div><div id="menu" class="ov"><div class="card"><div class="k">Приключение Люмо</div><h1>SUNBURST</h1><p>Возвращай свет погибающим мирам. Выбери планету.</p><div class="levels"><button class="lvl" onclick="start(1)">Уровень 1<br>Элион</button><button class="lvl" onclick="start(2)">Уровень 2<br>Аэрис</button></div></div></div><div id="win" class="ov hide"><div class="card"><div class="k">Планета восстановлена</div><h1 id="winTitle">Победа</h1><p id="winText"></p><button class="main" onclick="location.reload()">Выбрать уровень</button></div></div><script>const c=document.getElementById('c'),x=c.getContext('2d');let W,H,D,t=0,last=0,run=0,lv=1,k={l:0,r:0},stars=[],items=[],foes=[],parts=[],audio;const P={a:-1.55,j:0,v:0,hp:3,n:0,inv:0};const pl={x:0,y:0,r:220,life:0};function rs(){W=innerWidth;H=innerHeight;D=Math.min(devicePixelRatio||1,2);c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);pl.x=W/2;pl.y=H*.55;pl.r=Math.min(W,H)*.31;stars=Array.from({length:90},()=>[Math.random()*W,Math.random()*H,Math.random()*1.5+.3,Math.random()*.7+.2])}function pt(a,e=0){let r=pl.r+e;return[pl.x+Math.cos(a)*r,pl.y+Math.sin(a)*r]}function nd(a){while(a>Math.PI)a-=6.283;while(a<-Math.PI)a+=6.283;return a}function ad(a,b){return Math.abs(nd(a-b))}function hud(){score.textContent=P.n;goal.textContent=lv==1?8:6;hp.textContent='♥'.repeat(P.hp)+'♡'.repeat(3-P.hp)}function say(s){msg.textContent=s;msg.animate([{opacity:0},{opacity:1},{opacity:1},{opacity:0}],{duration:1400})}function tone(f,d=.15,v=.04){if(!audio)return;let o=audio.createOscillator(),g=audio.createGain();o.frequency.value=f;g.gain.value=v;o.connect(g).connect(audio.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+d);o.stop(audio.currentTime+d)}function burst(a,col,n=25){let q=pt(a,28);for(let i=0;i<n;i++){let z=Math.random()*6.28,s=Math.random()*220;parts.push({x:q[0],y:q[1],vx:Math.cos(z)*s,vy:Math.sin(z)*s,l:.7,c:col})}}function start(n){lv=n;audio=new(window.AudioContext||window.webkitAudioContext)();menu.classList.add('hide');hud.classList.remove('hide');controls.classList.remove('hide');world.textContent=n==1?'Элион — первый свет':'Аэрис — забытые ветра';objLabel.textContent=n==1?'Световые искры':'Осколки ветра';P.a=-1.55;P.j=P.v=0;P.hp=3;P.n=0;P.inv=0;pl.life=0;items=(n==1?[-2.8,-2.15,-1.5,-.9,-.35,.7,2,2.65]:[-2.82,-2.02,-1.16,-.28,.84,2.28]).map((a,i)=>({a,on:1,p:i}));foes=(n==1?[-2.5,-.65,2.3]:[-2.55,-.75,.55,2.45]).map((a,i)=>({a,on:1,d:i%2?-.28:.28,p:i}));parts=[];hud();run=1;last=performance.now();requestAnimationFrame(loop)}function jump(){if(run&&P.j<2){P.v=500;tone(260)}}function sun(){let g=lv==1?8:6;if(P.n<g){say('Собери все осколки света');return}P.n=0;pl.life=Math.min(1,pl.life+(lv==1?.5:.34));burst(P.a,'#fff099',90);tone(70,.8,.12);foes.forEach(f=>{if(f.on&&ad(f.a,P.a)<1){f.on=0;burst(f.a,'#bdf8ff',35)}});if(pl.life>=.99){run=0;winTitle.textContent=lv==1?'Элион проснулся':'Аэрис снова дышит';winText.textContent=lv==1?'Первый мир снова наполнен жизнью.':'Забытые ветра освобождены.';win.classList.remove('hide')}else{items.forEach((z,i)=>{z.on=1;z.a=nd(z.a+.38)});say(lv==1?'Земля снова оживает':'Небесный маяк зажжён')}hud()}function hit(){if(P.inv)return;P.hp--;P.inv=1.1;burst(P.a,'#ff5b91');hud();if(P.hp<1){run=0;setTimeout(()=>location.reload(),600)}}function up(dt){t+=dt;P.inv=Math.max(0,P.inv-dt);P.a=nd(P.a+(k.r-k.l)*.52*dt);P.v-=620*dt;P.j+=P.v*dt;if(P.j<0)P.j=P.v=0;items.forEach(s=>{if(s.on&&ad(s.a,P.a)<.11&&P.j<45){s.on=0;P.n++;burst(s.a,'#8ff5ff');tone(520+P.n*45);hud()}});foes.forEach(f=>{if(f.on){f.a=nd(f.a+f.d*dt);if(ad(f.a,P.a)<.12&&P.j<30)hit()}});parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=65*dt;p.l-=dt});parts=parts.filter(p=>p.l>0)}function lumo(){let q=pt(P.a,P.j+35);x.save();x.translate(...q);x.rotate(P.a+1.57);if(P.inv&&Math.floor(P.inv*12)%2)x.globalAlpha=.3;x.shadowBlur=22;x.shadowColor='#ffd65b';x.fillStyle='#081422';x.beginPath();x.ellipse(0,0,21,30,0,0,6.28);x.fill();x.beginPath();x.moveTo(-14,-22);x.lineTo(-18,-76);x.lineTo(-4,-35);x.fill();x.beginPath();x.moveTo(14,-22);x.lineTo(18,-76);x.lineTo(4,-35);x.fill();x.fillStyle='#ffd75c';x.beginPath();x.ellipse(-8,-18,6,9,0,0,6.28);x.ellipse(8,-18,6,9,0,0,6.28);x.fill();x.fillStyle='#fff';x.beginPath();x.arc(-10,-21,2,0,6.28);x.arc(6,-21,2,0,6.28);x.fill();x.shadowBlur=28;x.fillStyle='#ffe366';x.beginPath();x.arc(0,5,9+Math.sin(t*6),0,6.28);x.fill();x.strokeStyle='#ffc94f';x.lineWidth=2;x.beginPath();x.moveTo(0,5);x.lineTo(-8,24);x.moveTo(0,5);x.lineTo(8,24);x.moveTo(0,5);x.lineTo(0,-7);x.stroke();x.restore()}function draw(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,lv==1?'#112a49':'#123c59');g.addColorStop(1,'#020611');x.fillStyle=g;x.fillRect(0,0,W,H);stars.forEach(s=>{x.globalAlpha=s[3];x.fillStyle='#e8fbff';x.fillRect(s[0],s[1],s[2],s[2])});x.globalAlpha=1;let pg=x.createRadialGradient(pl.x-pl.r*.3,pl.y-pl.r*.4,20,pl.x,pl.y,pl.r);pg.addColorStop(0,pl.life>.3?(lv==1?'#557a55':'#6c9298'):'#334257');pg.addColorStop(1,'#07101b');x.fillStyle=pg;x.beginPath();x.arc(pl.x,pl.y,pl.r,0,6.28);x.fill();for(let i=0;i<24;i++){let a=-3.14+i*6.28/24,q=pt(a);x.save();x.translate(...q);x.rotate(a+1.57);x.strokeStyle=pl.life>.3?'#74e4a7':'#51494b';x.lineWidth=5;x.beginPath();x.moveTo(0,0);x.lineTo(0,-18-(i%4)*5);x.stroke();x.restore()}items.forEach(s=>{if(!s.on)return;let q=pt(s.a,26+Math.sin(t*3+s.p)*4);x.save();x.translate(...q);x.rotate(t);x.shadowBlur=22;x.shadowColor='#8ff5ff';x.fillStyle='#ecffff';x.fillRect(-7,-7,14,14);x.restore()});foes.forEach(f=>{if(!f.on)return;let q=pt(f.a,23);x.save();x.translate(...q);x.rotate(f.a+1.57);x.fillStyle='#180d2a';x.shadowBlur=18;x.shadowColor='#a64dff';x.beginPath();x.ellipse(0,-15,14,22,0,0,6.28);x.fill();x.restore()});lumo();parts.forEach(p=>{x.globalAlpha=p.l;x.fillStyle=p.c;x.fillRect(p.x,p.y,4,4)});x.globalAlpha=1}function loop(n){if(!run)return;let dt=Math.min(.033,(n-last)/1000);last=n;up(dt);draw();requestAnimationFrame(loop)}function hold(id,key){let e=document.getElementById(id);e.onpointerdown=q=>{q.preventDefault();k[key]=1};e.onpointerup=e.onpointercancel=e.onpointerleave=()=>k[key]=0}hold('L','l');hold('R','r');J.onclick=jump;S.onclick=sun;onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')k.l=1;if(e.key==='ArrowRight'||e.key==='d')k.r=1;if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')jump();if(e.key==='e'||e.key==='Enter')sun()};onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')k.l=0;if(e.key==='ArrowRight'||e.key==='d')k.r=0};onresize=rs;rs();draw();</script></body></html>
