<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>SUNBURST</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02050a;color:#fff;font-family:system-ui,Arial}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;z-index:5;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none}.box{padding:8px 12px;border-radius:15px;border:1px solid #ffffff25;background:#07101dcc;backdrop-filter:blur(10px);box-shadow:0 8px 25px #0008}.label{font-size:10px;letter-spacing:.14em;color:#9db4c8;text-transform:uppercase}.value{font-size:20px;font-weight:900}.bar{width:110px;height:7px;margin-top:5px;background:#ffffff20;border-radius:9px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#ff9d17,#fff59c);box-shadow:0 0 16px #ffc02f}.controls{position:fixed;z-index:6;bottom:max(14px,env(safe-area-inset-bottom));left:12px;right:12px;display:flex;justify-content:space-between}.grp{display:flex;gap:10px}.btn{width:62px;height:62px;border-radius:21px;border:1px solid #ffffff30;color:white;background:#07101dda;font-size:27px;font-weight:900;backdrop-filter:blur(9px);box-shadow:0 8px 24px #0008}.btn:active{transform:scale(.9)}.sun{width:73px;height:73px;border-radius:50%;color:#2c1300;border:2px solid #ffe783;background:radial-gradient(circle at 35% 27%,#fffbd5,#ffc12d 53%,#6b2600);box-shadow:0 0 25px #ffad304f}.overlay{position:fixed;z-index:20;inset:0;display:grid;place-items:center;padding:24px;text-align:center;background:radial-gradient(circle at 50% 43%,#ff9d2147,transparent 26%),radial-gradient(circle at 50% 73%,#182631 0 27%,transparent 27.5%),linear-gradient(#010307,#0b0a08 66%,#010101)}.overlay:before{content:"";position:absolute;inset:0;opacity:.55;background:radial-gradient(circle,#ffd36b 0 1px,transparent 2px);background-size:71px 83px}.card{position:relative;z-index:2;width:min(620px,100%)}.brand{font-family:Georgia,serif;font-size:clamp(56px,13vw,112px);letter-spacing:.08em;color:#ffd15a;text-shadow:0 0 10px #f1990f,0 0 38px #ff9c1c;margin:0}.sub{font-size:12px;letter-spacing:.25em;color:#e7c98b}.coverLumo{position:relative;width:170px;height:210px;margin:8px auto;filter:drop-shadow(0 0 24px #ffb52e)}.ear{position:absolute;top:0;width:45px;height:125px;background:linear-gradient(90deg,#05080d,#1b2632 46%,#ffb51f 49%,#fff4a5 60%,#ff8d00 71%,#07101a 74%);clip-path:polygon(50% 0,100% 100%,0 100%)}.ear.l{left:24px;transform:rotate(-8deg)}.ear.r{right:24px;transform:rotate(8deg)}.head{position:absolute;left:28px;top:86px;width:114px;height:104px;border-radius:50% 50% 43% 43%;background:radial-gradient(circle at 42% 32%,#334354,#0a131d 59%,#010306);box-shadow:inset 0 0 16px #536477}.eye{position:absolute;top:27px;width:31px;height:40px;border-radius:50%;background:radial-gradient(circle at 42% 32%,#fff 0 11%,#ffe36b 14% 43%,#c77900 56%,#1a0900 69%);box-shadow:0 0 18px #ffc12d}.eye.l{left:19px}.eye.r{right:19px}.heart{position:absolute;left:43px;bottom:-35px;font-size:36px;color:#fff3af;text-shadow:0 0 10px #ffc018,0 0 30px #ff8100}.play{border:0;border-radius:18px;padding:16px 38px;font-size:21px;font-weight:950;letter-spacing:.12em;color:#251000;background:linear-gradient(135deg,#fff7ba,#ffbd32);box-shadow:0 0 30px #ffb52e80}.desc{max-width:480px;margin:12px auto 20px;color:#d2c9b6;line-height:1.5}.hidden{display:none}.toast{position:fixed;z-index:10;top:24%;left:50%;transform:translateX(-50%);opacity:0;padding:11px 16px;border-radius:14px;background:#07101de8;border:1px solid #ffffff25;font-weight:900;white-space:nowrap}@media(max-width:650px){.title{display:none}.btn{width:56px;height:56px}.sun{width:67px;height:67px}.value{font-size:17px}}</style></head><body><canvas id="g"></canvas><div class="hud"><div class="box"><div class="label">Свет</div><div class="value"><span id="light">0</span>/8</div><div class="bar"><div id="fill" class="fill"></div></div></div><div class="box title"><div class="label">Планета 01</div><div class="value">Элион — первый свет</div></div><div class="box"><div class="label">Жизнь</div><div class="value" id="hp">♥♥♥</div></div></div><div class="controls"><div class="grp"><button class="btn" id="left">←</button><button class="btn" id="right">→</button></div><div class="grp"><button class="btn" id="jump">↑</button><button class="btn sun" id="burst">☀</button></div></div><div id="toast" class="toast"></div><div id="menu" class="overlay"><div class="card"><div class="sub">A LUMEN SURGE ADVENTURE</div><h1 class="brand">SUNBURST</h1><div class="coverLumo"><div class="ear l"></div><div class="ear r"></div><div class="head"><div class="eye l"></div><div class="eye r"></div><div class="heart">♥</div></div></div><div class="desc">Собирай свет. Наполняй сердце. Верни жизнь погибающим мирам.</div><button class="play" id="play">ИГРАТЬ</button></div></div><div id="win" class="overlay hidden"><div class="card"><div class="sub">ПЛАНЕТА ВОССТАНОВЛЕНА</div><h1 class="brand">ЭЛИОН</h1><div class="desc">Первый мир снова дышит. Свет Люмо открыл дорогу к следующей планете.</div><button class="play" onclick="location.reload()">ЕЩЁ РАЗ</button></div></div><script>const c=document.getElementById('g'),x=c.getContext('2d');let W,H,D,t=0,last=0,run=0,K={l:0,r:0},P={a:-1.57,j:0,v:0,hp:3,L:0,inv:0},world={x:0,y:0,r:220,life:0},sparks=[],mobs=[],dust=[],stars=[],craters=[],parts=[],boss={a:.5,hp:3,on:0,dead:0};const TAU=Math.PI*2;function resize(){W=innerWidth;H=innerHeight;D=Math.min(devicePixelRatio||1,2);c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);world.x=W/2;world.y=H*.55;world.r=Math.min(W,H)*.31;stars=Array.from({length:150},()=>[Math.random()*W,Math.random()*H,.3+Math.random()*1.6,.2+Math.random()*.7]);dust=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,s:.4+Math.random()*1.6,v:3+Math.random()*10,p:Math.random()*TAU}));craters=Array.from({length:24},(_,i)=>({a:i*TAU/24+Math.random()*.14,r:3+Math.random()*11,o:.04+Math.random()*.08}))}function pt(a,e=0){let r=world.r+e;return[world.x+Math.cos(a)*r,world.y+Math.sin(a)*r]}function norm(a){while(a>Math.PI)a-=TAU;while(a<-Math.PI)a+=TAU;return a}function dist(a,b){return Math.abs(norm(a-b))}function init(){P={a:-1.57,j:0,v:0,hp:3,L:0,inv:0};world.life=0;boss={a:.55,hp:3,on:0,dead:0};sparks=[-2.85,-2.2,-1.55,-.95,-.32,.68,1.85,2.55].map((a,i)=>({a,on:1,p:i}));mobs=[-2.52,-.62,2.3].map((a,i)=>({a,dir:i%2?-.24:.24,on:1}));parts=[];hud()}function hud(){light.textContent=P.L;fill.style.width=P.L/8*100+'%';hp.textContent='♥'.repeat(P.hp)+'♡'.repeat(3-P.hp)}function toast(s){let e=document.getElementById('toast');e.textContent=s;e.animate([{opacity:0,transform:'translate(-50%,12px)'},{opacity:1,transform:'translate(-50%,0)'},{opacity:1},{opacity:0,transform:'translate(-50%,-18px)'}],{duration:1450})}function particles(px,py,n,col){for(let i=0;i<n;i++){let a=Math.random()*TAU,s=Math.random()*260;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:.5+Math.random()*.7,c:col})}}function jumpNow(){if(run&&P.j<2)P.v=550}function hit(){if(P.inv)return;P.hp--;P.inv=1.3;let q=pt(P.a,P.j+30);particles(q[0],q[1],30,'#ff5c78');hud();if(P.hp<=0){run=0;toast('Свет Люмо погас');setTimeout(()=>location.reload(),900)}}function sun(){if(!run)return;if(P.L<8){toast('Собери все 8 искр');return}P.L=0;let q=pt(P.a,P.j+35);particles(q[0],q[1],100,'#ffe36e');mobs.forEach(m=>{if(m.on&&dist(m.a,P.a)<1.05)m.on=0});world.life=Math.min(1,world.life+.34);if(world.life>=.68&&!boss.on){boss.on=1;toast('Теневой Страж пробудился')}if(boss.on&&!boss.dead&&dist(boss.a,P.a)<1.15){boss.hp--;toast('Страж теряет тьму: '+boss.hp);if(boss.hp<=0){boss.dead=1;world.life=1;particles(q[0],q[1],170,'#fff0a0');setTimeout(()=>{run=0;win.classList.remove('hidden')},900)}}sparks.forEach((s,i)=>{s.on=true;s.a=norm(s.a+.21+i*.01)});hud()}function update(dt){t+=dt;P.inv=Math.max(0,P.inv-dt);P.a=norm(P.a+(K.r-K.l)*.0088*60*dt);P.v-=620*dt;P.j+=P.v*dt;if(P.j<0)P.j=P.v=0;sparks.forEach(s=>{if(s.on&&dist(s.a,P.a)<.11&&P.j<44){s.on=0;P.L++;let q=pt(s.a,27);particles(q[0],q[1],28,'#ffd75d');toast('Искра '+P.L+'/8');hud()}});mobs.forEach(m=>{if(m.on){m.a=norm(m.a+m.dir*dt);if(dist(m.a,P.a)<.12&&P.j<30)hit()}});if(boss.on&&!boss.dead){boss.a=norm(boss.a+.12*dt);if(dist(boss.a,P.a)<.17&&P.j<45)hit()}parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=70*dt;p.l-=dt});parts=parts.filter(p=>p.l>0)}function poly(r,n,rot=0){x.beginPath();for(let i=0;i<n;i++){let a=rot+i*TAU/n,u=Math.cos(a)*r,v=Math.sin(a)*r;i?x.lineTo(u,v):x.moveTo(u,v)}x.closePath()}function tree(a,h=1,seed=0){let q=pt(a);x.save();x.translate(...q);x.rotate(a+1.57);x.lineCap='round';x.strokeStyle='#171315';x.shadowBlur=8;x.shadowColor='#000';x.lineWidth=7*h;x.beginPath();x.moveTo(0,3);x.bezierCurveTo(Math.sin(t*.6+seed)*2,-20*h,-4,-39*h,1,-61*h);x.stroke();x.lineWidth=3*h;for(let j=0;j<5;j++){let y=-21*h-j*8*h,s=j%2?-1:1;x.beginPath();x.moveTo(0,y);x.quadraticCurveTo(s*12*h,y-8*h,s*(19+j*2)*h,y-20*h);x.stroke()}x.restore()}function lumo(){let q=pt(P.a,P.j+38);x.save();x.translate(...q);x.rotate(P.a+1.57);let bob=Math.sin(t*7)*1.3,step=Math.sin(t*14)*(K.l||K.r),en=.25+.75*P.L/8,blink=Math.sin(t*.7)>.992?.12:1;if(P.inv&&Math.floor(P.inv*12)%2)x.globalAlpha=.3;x.translate(0,bob);x.scale(1.18,1.18);x.globalAlpha*=.18+.14*en;x.shadowBlur=42;x.shadowColor='#ffc53d';x.fillStyle='#ffbf35';x.beginPath();x.ellipse(0,-22,35,61,0,0,TAU);x.fill();x.globalAlpha=1;x.shadowBlur=0;x.lineCap='round';x.strokeStyle='#07101a';x.lineWidth=12;x.beginPath();x.moveTo(14,13);x.bezierCurveTo(46,24,51,-6,40,-29);x.stroke();x.strokeStyle='#ffbf35';x.lineWidth=2;x.stroke();x.shadowBlur=20;x.shadowColor='#ffca3d';x.fillStyle='#fff0a0';x.beginPath();x.arc(40,-31,6,0,TAU);x.fill();x.shadowBlur=0;x.strokeStyle='#07101a';x.lineWidth=11;x.beginPath();x.moveTo(-10,16);x.lineTo(-13+step*5,39);x.moveTo(10,16);x.lineTo(13-step*5,39);x.stroke();let body=x.createRadialGradient(-7,-3,2,0,8,28);body.addColorStop(0,'#243447');body.addColorStop(.5,'#0b1723');body.addColorStop(1,'#02060c');x.fillStyle=body;x.beginPath();x.moveTo(-20,-5);x.quadraticCurveTo(-24,14,-15,29);x.quadraticCurveTo(0,37,15,29);x.quadraticCurveTo(24,14,20,-5);x.quadraticCurveTo(0,-17,-20,-5);x.fill();x.strokeStyle='#07101a';x.lineWidth=10;x.beginPath();x.moveTo(-17,-2);x.lineTo(-26-step*3,19);x.moveTo(17,-2);x.lineTo(26+step*3,19);x.stroke();let eg=x.createLinearGradient(0,-95,0,-28);eg.addColorStop(0,'#050a12');eg.addColorStop(.66,'#102032');eg.addColorStop(1,'#21374b');x.fillStyle=eg;x.shadowBlur=18;x.shadowColor='#ffb52e';x.beginPath();x.moveTo(-20,-31);x.bezierCurveTo(-34,-54,-29,-85,-17,-99);x.bezierCurveTo(-17,-80,-8,-91,-9,-65);x.quadraticCurveTo(-7,-43,-4,-30);x.fill();x.beginPath();x.moveTo(20,-31);x.bezierCurveTo(34,-54,29,-85,17,-99);x.bezierCurveTo(17,-80,8,-91,9,-65);x.quadraticCurveTo(7,-43,4,-30);x.fill();x.fillStyle='rgba(255,188,53,'+(.45+.45*en)+')';x.beginPath();x.moveTo(-17,-37);x.quadraticCurveTo(-24,-62,-18,-87);x.quadraticCurveTo(-12,-67,-12,-41);x.fill();x.beginPath();x.moveTo(17,-37);x.quadraticCurveTo(24,-62,18,-87);x.quadraticCurveTo(12,-67,12,-41);x.fill();let hg=x.createRadialGradient(-8,-35,3,0,-28,32);hg.addColorStop(0,'#273a50');hg.addColorStop(.55,'#091521');hg.addColorStop(1,'#01050a');x.fillStyle=hg;x.beginPath();x.moveTo(-23,-40);x.quadraticCurveTo(-32,-29,-24,-15);x.lineTo(-31,-10);x.lineTo(-21,-9);x.quadraticCurveTo(0,4,21,-9);x.lineTo(31,-10);x.lineTo(24,-15);x.quadraticCurveTo(32,-29,23,-40);x.quadraticCurveTo(0,-54,-23,-40);x.fill();x.save();x.scale(1,blink);let eye=x.createRadialGradient(-3,-3,1,0,0,12);eye.addColorStop(0,'#fff');eye.addColorStop(.38,'#fff49a');eye.addColorStop(.76,'#ffc13b');eye.addColorStop(1,'#8e4e00');x.shadowBlur=22;x.shadowColor='#ffd44d';x.fillStyle=eye;x.beginPath();x.ellipse(-10,-30,8.5,11,0,0,TAU);x.fill();x.beginPath();x.ellipse(10,-30,8.5,11,0,0,TAU);x.fill();x.fillStyle='#291500';x.beginPath();x.ellipse(-10,-28,2.3,5,0,0,TAU);x.fill();x.beginPath();x.ellipse(10,-28,2.3,5,0,0,TAU);x.fill();x.restore();x.strokeStyle='rgba(255,196,54,'+(.4+.6*en)+')';x.lineWidth=1.8;x.shadowBlur=14;x.shadowColor='#ffc12e';x.beginPath();x.moveTo(0,6);x.lineTo(0,24);x.moveTo(-13,6);x.quadraticCurveTo(-20,11,-24,20);x.moveTo(13,6);x.quadraticCurveTo(20,11,24,20);x.moveTo(-10,-44);x.lineTo(-17,-73);x.moveTo(10,-44);x.lineTo(17,-73);x.stroke();let pulse=1+Math.sin(t*6.5)*.1;x.save();x.translate(0,7);x.scale(pulse,pulse);x.fillStyle='#fff2a0';x.shadowBlur=28;x.shadowColor='#ffae00';x.beginPath();x.moveTo(0,-8);x.bezierCurveTo(-12,-17,-19,-4,0,14);x.bezierCurveTo(19,-4,12,-17,0,-8);x.fill();x.restore();x.restore()}function draw(){let bg=x.createRadialGradient(W*.5,H*.34,10,W*.5,H*.5,Math.max(W,H)*.74);bg.addColorStop(0,'#17344f');bg.addColorStop(.47,'#081629');bg.addColorStop(1,'#010207');x.fillStyle=bg;x.fillRect(0,0,W,H);stars.forEach(s=>{x.globalAlpha=s[3]*(.6+.4*Math.sin(t*.8+s[0]));x.fillStyle=s[2]>1.4?'#fff4d1':'#dff8ff';x.fillRect(s[0],s[1],s[2],s[2])});x.globalAlpha=1;dust.forEach(z=>{z.y-=z.v*.01;if(z.y<0)z.y=H;x.globalAlpha=.1+.1*Math.sin(t+z.p);x.fillStyle='#ffbd4a';x.beginPath();x.arc(z.x,z.y,z.s,0,TAU);x.fill()});x.globalAlpha=1;let pg=x.createRadialGradient(world.x-world.r*.4,world.y-world.r*.45,8,world.x,world.y,world.r*1.08);pg.addColorStop(0,world.life>.5?'#63715b':'#414b59');pg.addColorStop(.3,world.life>.7?'#314d3b':'#26303b');pg.addColorStop(.75,'#101720');pg.addColorStop(1,'#020408');x.shadowBlur=45;x.shadowColor=world.life>.7?'#62ffa844':'#000';x.fillStyle=pg;x.beginPath();x.arc(world.x,world.y,world.r,0,TAU);x.fill();x.shadowBlur=0;x.save();x.beginPath();x.arc(world.x,world.y,world.r-1,0,TAU);x.clip();craters.forEach(c=>{let rr=world.r*.7,px=world.x+Math.cos(c.a)*rr,py=world.y+Math.sin(c.a)*rr;x.globalAlpha=c.o;x.fillStyle='#000';x.beginPath();x.ellipse(px,py,c.r*1.7,c.r,.6+c.a,0,TAU);x.fill()});x.restore();x.globalAlpha=1;for(let i=0;i<25;i++)tree(-3.05+i*6.1/25,.54+(i%5)*.09,i);sparks.forEach(s=>{if(!s.on)return;let q=pt(s.a,27+Math.sin(t*3+s.p)*4);x.save();x.translate(...q);x.rotate(t*1.4+s.p);x.shadowBlur=28;x.shadowColor='#ffca2e';x.fillStyle='#fff5aa';poly(9,8);x.fill();x.strokeStyle='#ffae17';x.lineWidth=2;x.beginPath();x.arc(0,0,15+Math.sin(t*5+s.p)*2,0,TAU);x.stroke();x.restore()});mobs.forEach(m=>{if(!m.on)return;let q=pt(m.a,18);x.save();x.translate(...q);x.rotate(m.a+1.57);x.shadowBlur=24;x.shadowColor='#9f2cff';x.fillStyle='#100616';poly(18,12,t*.4);x.fill();x.fillStyle='#ff5b55';x.beginPath();x.arc(-5,-2,3,0,TAU);x.arc(5,-2,3,0,TAU);x.fill();x.restore()});if(boss.on&&!boss.dead){let q=pt(boss.a,42);x.save();x.translate(...q);x.rotate(boss.a+1.57);x.shadowBlur=35;x.shadowColor='#ff2948';x.fillStyle='#15050b';poly(44,14,t*.2);x.fill();x.fillStyle='#ff5662';x.beginPath();x.arc(-12,-5,5,0,TAU);x.arc(12,-5,5,0,TAU);x.fill();x.restore()}lumo();parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.shadowBlur=10;x.shadowColor=p.c;x.fillStyle=p.c;x.fillRect(p.x,p.y,4,4)});x.shadowBlur=0;x.globalAlpha=1;let vg=x.createRadialGradient(W/2,H/2,Math.min(W,H)*.23,W/2,H/2,Math.max(W,H)*.72);vg.addColorStop(.56,'transparent');vg.addColorStop(1,'#000b');x.fillStyle=vg;x.fillRect(0,0,W,H)}function loop(n){if(!run)return;let dt=Math.min(.033,(n-last)/1000);last=n;update(dt);draw();requestAnimationFrame(loop)}function hold(id,key){let e=document.getElementById(id);e.onpointerdown=v=>{v.preventDefault();K[key]=1};e.onpointerup=e.onpointerleave=e.onpointercancel=()=>K[key]=0}hold('left','l');hold('right','r');jump.onclick=jumpNow;burst.onclick=sun;play.onclick=()=>{init();menu.classList.add('hidden');run=1;last=performance.now();requestAnimationFrame(loop)};onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')K.l=1;if(e.key==='ArrowRight'||e.key==='d')K.r=1;if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')jumpNow();if(e.key==='e'||e.key==='Enter')sun()};onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')K.l=0;if(e.key==='ArrowRight'||e.key==='d')K.r=0};onresize=resize;resize();init();draw();</script></body></html>
