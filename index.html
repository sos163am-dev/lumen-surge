<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>SUNBURST 2.0</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#01030a;color:#fff;font-family:system-ui,Arial}canvas{position:fixed;inset:0;width:100%;height:100%;touch-action:none}.hud{position:fixed;z-index:5;top:max(9px,env(safe-area-inset-top));left:9px;right:9px;display:flex;justify-content:space-between;pointer-events:none}.box{padding:8px 11px;border-radius:15px;border:1px solid #ffffff25;background:#06111dcc;backdrop-filter:blur(9px);box-shadow:0 8px 24px #0009}.label{font-size:10px;letter-spacing:.13em;color:#9db4ca;text-transform:uppercase}.value{font-size:18px;font-weight:900}.bar{width:105px;height:7px;margin-top:5px;background:#ffffff20;border-radius:9px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#5ceaff,#ffe77b);box-shadow:0 0 15px #ffd64a}.controls{position:fixed;z-index:7;bottom:max(14px,env(safe-area-inset-bottom));left:12px;right:12px;display:flex;justify-content:space-between}.group{display:flex;gap:10px}.btn{width:69px;height:69px;border-radius:22px;border:1px solid #ffffff35;background:#07121de8;color:#fff;font-size:31px;font-weight:900;box-shadow:0 9px 25px #0009;touch-action:none}.btn:active{transform:scale(.91)}.sun{width:78px;height:78px;border-radius:50%;color:#311300;border:2px solid #fff09a;background:radial-gradient(circle at 35% 28%,#fffbd2,#ffc02f 54%,#6f2600);box-shadow:0 0 27px #ffb62d66}.overlay{position:fixed;z-index:20;inset:0;display:grid;place-items:center;text-align:center;padding:22px;background:radial-gradient(circle at 50% 40%,#ffae293b,transparent 26%),linear-gradient(#01030aeb,#030612f5)}.hidden{display:none}.card{width:min(600px,100%)}h1{font-family:Georgia,serif;font-size:clamp(54px,13vw,105px);letter-spacing:.07em;margin:4px 0;color:#ffd159;text-shadow:0 0 12px #f59b15,0 0 42px #ff9e20}.sub{font-size:11px;letter-spacing:.24em;color:#e6c886}.desc{max-width:490px;margin:10px auto 20px;color:#d4cbb9;line-height:1.5}.play{border:0;border-radius:18px;padding:16px 38px;font-size:21px;font-weight:950;letter-spacing:.11em;color:#241000;background:linear-gradient(135deg,#fff7b8,#ffbd30);box-shadow:0 0 33px #ffb52e80}.toast{position:fixed;z-index:10;top:22%;left:50%;transform:translateX(-50%);opacity:0;padding:11px 16px;border-radius:14px;background:#07101dea;border:1px solid #ffffff28;font-weight:900;white-space:nowrap}@media(max-width:650px){.title{display:none}.btn{width:66px;height:66px}.sun{width:75px;height:75px}}</style></head><body><canvas id="g"></canvas><div class="hud"><div class="box"><div class="label">Свет</div><div class="value"><span id="light">0</span>/8</div><div class="bar"><div id="fill" class="fill"></div></div></div><div class="box title"><div class="label">Планета 01</div><div class="value">Элион — первый свет</div></div><div class="box"><div class="label">Жизнь</div><div id="hp" class="value">♥♥♥</div></div></div><div class="controls"><div class="group"><button id="left" class="btn">←</button><button id="right" class="btn">→</button></div><div class="group"><button id="jump" class="btn">↑</button><button id="burst" class="btn sun">☀</button></div></div><div id="toast" class="toast"></div><div id="menu" class="overlay"><div class="card"><div class="sub">A LUMEN SURGE ADVENTURE</div><h1>SUNBURST</h1><div class="desc">Люмо и Нокси должны собрать восемь искр, оживить Элион и победить Теневого Стража.</div><button id="play" class="play">ИГРАТЬ</button></div></div><div id="win" class="overlay hidden"><div class="card"><div class="sub">ПЛАНЕТА ВОССТАНОВЛЕНА</div><h1>ЭЛИОН</h1><div class="desc">Люмо и Нокси вернули свет первому миру.</div><button class="play" onclick="location.reload()">ЕЩЁ РАЗ</button></div></div><script>const c=document.getElementById('g'),x=c.getContext('2d'),T=Math.PI*2;let W,H,D,t=0,last=0,run=0,K={l:0,r:0},stars=[],dust=[],sparks=[],mobs=[],parts=[];let P={a:-1.57,j:0,v:0,hp:3,L:0,inv:0},N={a:-1.85,j:0},world={x:0,y:0,r:250,life:0},boss={a:.5,hp:5,on:0,dead:0};function resize(){W=innerWidth;H=innerHeight;D=Math.min(devicePixelRatio||1,2);c.width=W*D;c.height=H*D;x.setTransform(D,0,0,D,0,0);world.x=W/2;world.y=H*.54;world.r=Math.min(W,H)*.43;stars=Array.from({length:180},()=>[Math.random()*W,Math.random()*H,.4+Math.random()*1.7,.25+Math.random()*.7]);dust=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H,s:.4+Math.random()*1.5,p:Math.random()*T}))}function pt(a,e=0){let r=world.r+e;return[world.x+Math.cos(a)*r,world.y+Math.sin(a)*r]}function norm(a){while(a>Math.PI)a-=T;while(a<-Math.PI)a+=T;return a}function dst(a,b){return Math.abs(norm(a-b))}function init(){P={a:-1.57,j:0,v:0,hp:3,L:0,inv:0};N={a:-1.85,j:0};world.life=0;boss={a:.55,hp:5,on:0,dead:0};sparks=[-2.85,-2.2,-1.56,-.94,-.3,.72,1.85,2.52].map((a,i)=>({a,on:1,p:i}));mobs=[-2.55,-.62,2.27].map((a,i)=>({a,dir:i%2?-.32:.32,on:1}));parts=[];hud()}function hud(){light.textContent=P.L;fill.style.width=P.L/8*100+'%';hp.textContent='♥'.repeat(P.hp)+'♡'.repeat(3-P.hp)}function say(s){toast.textContent=s;toast.animate([{opacity:0,transform:'translate(-50%,12px)'},{opacity:1,transform:'translate(-50%,0)'},{opacity:1},{opacity:0,transform:'translate(-50%,-18px)'}],{duration:1400})}function puff(px,py,n,col){for(let i=0;i<n;i++){let a=Math.random()*T,s=Math.random()*240;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:.45+Math.random()*.7,c:col})}}function jumpNow(){if(run&&P.j<18)P.v=720}function hit(){if(P.inv)return;P.hp--;P.inv=1.15;let q=pt(P.a,P.j+25);puff(q[0],q[1],30,'#ff557b');hud();if(P.hp<=0){run=0;say('Свет Люмо погас');setTimeout(()=>location.reload(),900)}}function sun(){if(!run)return;if(P.L<8){say('Собери все 8 искр');return}P.L=0;let q=pt(P.a,P.j+30);puff(q[0],q[1],120,'#ffe578');mobs.forEach(m=>{if(m.on&&dst(m.a,P.a)<1.05)m.on=0});world.life=Math.min(1,world.life+.4);if(world.life>=.75&&!boss.on){boss.on=1;say('Теневой Страж пробудился')}if(boss.on&&!boss.dead&&dst(boss.a,P.a)<1.2){boss.hp--;say('Сила Стража: '+boss.hp);if(boss.hp<=0){boss.dead=1;world.life=1;puff(q[0],q[1],190,'#fff3ae');setTimeout(()=>{run=0;win.classList.remove('hidden')},850)}}sparks.forEach((s,i)=>{s.on=true;s.a=norm(s.a+.18+i*.012)});hud()}function update(dt){t+=dt;P.inv=Math.max(0,P.inv-dt);P.a=norm(P.a+(K.r-K.l)*.0095*60*dt);P.v-=720*dt;P.j+=P.v*dt;if(P.j<0)P.j=P.v=0;let target=norm(P.a-(K.r?-.23:K.l?.23:.2));N.a=norm(N.a+norm(target-N.a)*Math.min(1,dt*5.5));N.j=Math.max(0,Math.sin(t*7)*2+(P.j>25?Math.min(18,P.j*.23):0));sparks.forEach(s=>{if(s.on&&dst(s.a,P.a)<.12&&P.j<48){s.on=0;P.L++;let q=pt(s.a,27);puff(q[0],q[1],25,'#ffd968');say('Искра '+P.L+'/8');hud()}else if(s.on&&dst(s.a,N.a)<.075){s.on=0;P.L++;let q=pt(s.a,27);puff(q[0],q[1],20,'#ffd968');say('Нокси нашёл искру');hud()}});mobs.forEach(m=>{if(m.on){m.a=norm(m.a+m.dir*dt);if(dst(m.a,P.a)<.12&&P.j<30)hit()}});if(boss.on&&!boss.dead){boss.a=norm(boss.a+.17*dt);if(dst(boss.a,P.a)<.22&&P.j<58)hit()}parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=65*dt;p.l-=dt});parts=parts.filter(p=>p.l>0)}function poly(r,n,rot=0){x.beginPath();for(let i=0;i<n;i++){let a=rot+i*T/n,u=Math.cos(a)*r,v=Math.sin(a)*r;i?x.lineTo(u,v):x.moveTo(u,v)}x.closePath()}function tree(a,h=1){let q=pt(a);x.save();x.translate(...q);x.rotate(a+1.57);x.strokeStyle=world.life>.7?'#5a4630':'#171316';x.lineCap='round';x.lineWidth=7*h;x.beginPath();x.moveTo(0,3);x.bezierCurveTo(-3,-19*h,4,-37*h,0,-58*h);x.stroke();x.lineWidth=3*h;for(let j=0;j<5;j++){let y=-20*h-j*8*h,s=j%2?-1:1;x.beginPath();x.moveTo(0,y);x.quadraticCurveTo(s*12*h,y-7*h,s*(19+j*2)*h,y-19*h);x.stroke()}if(world.life>.7){x.fillStyle='#65efa0';x.shadowBlur=18;x.shadowColor='#5cff9a';for(let i=0;i<7;i++){let a=i*.9;x.beginPath();x.arc(Math.cos(a)*22,-58+Math.sin(a)*20,8,0,T);x.fill()}}x.restore()}function lumo(){let q=pt(P.a,P.j+37);x.save();x.translate(...q);x.rotate(P.a+1.57);let step=Math.sin(t*14)*(K.l||K.r),blink=Math.sin(t*.72)>.992?.13:1,en=.3+.7*P.L/8;if(P.inv&&Math.floor(P.inv*12)%2)x.globalAlpha=.3;x.shadowBlur=35;x.shadowColor='#ffc944';x.fillStyle='#09131f';x.beginPath();x.ellipse(0,-8,22,31,0,0,T);x.fill();x.lineCap='round';x.strokeStyle='#09131f';x.lineWidth=11;x.beginPath();x.moveTo(13,5);x.bezierCurveTo(43,20,48,-7,36,-27);x.stroke();x.strokeStyle='#ffd05a';x.lineWidth=2;x.stroke();x.fillStyle='#0b1724';x.beginPath();x.ellipse(0,-38,27,27,0,0,T);x.fill();x.beginPath();x.moveTo(-21,-50);x.lineTo(-14,-94);x.lineTo(-3,-57);x.closePath();x.fill();x.beginPath();x.moveTo(21,-50);x.lineTo(14,-94);x.lineTo(3,-57);x.closePath();x.fill();x.strokeStyle='#ffc43c';x.lineWidth=3;x.beginPath();x.moveTo(-14,-85);x.lineTo(-8,-57);x.moveTo(14,-85);x.lineTo(8,-57);x.stroke();x.shadowBlur=20;x.shadowColor='#ffd54f';x.fillStyle='#ffe47a';x.beginPath();x.ellipse(-9,-39,7,10*blink,0,0,T);x.ellipse(9,-39,7,10*blink,0,0,T);x.fill();x.fillStyle='#fff2b0';x.beginPath();x.arc(0,-27,3,0,T);x.fill();x.strokeStyle='#08121d';x.lineWidth=10;x.beginPath();x.moveTo(-10,16);x.lineTo(-12+step*4,37);x.moveTo(10,16);x.lineTo(12-step*4,37);x.stroke();x.shadowBlur=25*en;x.shadowColor='#ffbd28';x.fillStyle='#fff0a3';x.font='bold 27px serif';x.textAlign='center';x.fillText('♥',0,4);x.restore()}function noxy(){let q=pt(N.a,N.j+23);x.save();x.translate(...q);x.rotate(N.a+1.57);x.scale(.75,.75);x.shadowBlur=25;x.shadowColor='#ffbd3b';x.fillStyle='#0a1521';x.beginPath();x.ellipse(0,-8,20,27,0,0,T);x.fill();x.beginPath();x.ellipse(0,-35,23,23,0,0,T);x.fill();x.beginPath();x.moveTo(-18,-47);x.lineTo(-12,-78);x.lineTo(-2,-51);x.closePath();x.fill();x.beginPath();x.moveTo(18,-47);x.lineTo(12,-78);x.lineTo(2,-51);x.closePath();x.fill();x.strokeStyle='#ffc84b';x.lineWidth=3;x.beginPath();x.moveTo(-11,-70);x.lineTo(-7,-51);x.moveTo(11,-70);x.lineTo(7,-51);x.stroke();x.fillStyle='#ffe37a';x.beginPath();x.ellipse(-7,-36,5,7,0,0,T);x.ellipse(7,-36,5,7,0,0,T);x.fill();x.strokeStyle='#07111b';x.lineWidth=10;x.beginPath();x.moveTo(12,5);x.bezierCurveTo(39,14,43,-10,29,-26);x.stroke();x.strokeStyle='#ffc64b';x.lineWidth=2;x.stroke();x.restore()}function draw(){x.clearRect(0,0,W,H);let bg=x.createRadialGradient(W*.42,H*.35,5,W*.5,H*.5,Math.max(W,H)*.8);bg.addColorStop(0,'#27345f');bg.addColorStop(.32,'#101a39');bg.addColorStop(.7,'#050819');bg.addColorStop(1,'#010208');x.fillStyle=bg;x.fillRect(0,0,W,H);x.save();x.globalAlpha=.26;let neb=x.createRadialGradient(W*.2,H*.26,5,W*.2,H*.26,W*.65);neb.addColorStop(0,'#a34289');neb.addColorStop(.4,'#343d8d');neb.addColorStop(1,'transparent');x.fillStyle=neb;x.fillRect(0,0,W,H);x.restore();stars.forEach(s=>{x.globalAlpha=s[3]*(.65+.35*Math.sin(t+s[0]));x.fillStyle=s[2]>1.5?'#fff7d9':'#dff4ff';x.fillRect(s[0],s[1],s[2],s[2])});x.globalAlpha=1;dust.forEach(z=>{x.globalAlpha=.12+.1*Math.sin(t+z.p);x.fillStyle='#ffc65d';x.beginPath();x.arc(z.x,z.y,z.s,0,T);x.fill()});x.globalAlpha=1;x.save();x.shadowBlur=55;x.shadowColor=world.life>.7?'#56ff9c55':'#000';let pg=x.createRadialGradient(world.x-world.r*.38,world.y-world.r*.42,8,world.x,world.y,world.r*1.05);pg.addColorStop(0,world.life>.7?'#657c62':'#43505d');pg.addColorStop(.36,world.life>.7?'#304b38':'#26313d');pg.addColorStop(.8,'#101722');pg.addColorStop(1,'#020408');x.fillStyle=pg;x.beginPath();x.arc(world.x,world.y,world.r,0,T);x.fill();x.restore();x.save();x.globalCompositeOperation='screen';let rim=x.createRadialGradient(world.x,world.y,world.r*.84,world.x,world.y,world.r*1.12);rim.addColorStop(.72,'transparent');rim.addColorStop(.92,world.life>.7?'#6cffaa30':'#86bff02c');rim.addColorStop(1,'transparent');x.fillStyle=rim;x.beginPath();x.arc(world.x,world.y,world.r*1.13,0,T);x.fill();x.restore();for(let i=0;i<24;i++)tree(-3.05+i*6.1/24,.5+(i%5)*.08);sparks.forEach(s=>{if(!s.on)return;let q=pt(s.a,25+Math.sin(t*3+s.p)*4);x.save();x.translate(...q);x.rotate(t*1.4+s.p);x.shadowBlur=26;x.shadowColor='#ffd65d';x.fillStyle='#fff5a6';poly(9,8);x.fill();x.restore()});mobs.forEach(m=>{if(!m.on)return;let q=pt(m.a,18);x.save();x.translate(...q);x.rotate(m.a+1.57);x.shadowBlur=24;x.shadowColor='#a82dff';x.fillStyle='#120716';poly(18,12,t*.4);x.fill();x.fillStyle='#ff655f';x.beginPath();x.arc(-5,-3,3,0,T);x.arc(5,-3,3,0,T);x.fill();x.restore()});if(boss.on&&!boss.dead){let q=pt(boss.a,68);x.save();x.translate(...q);x.rotate(boss.a+1.57);x.scale(1.75,1.75);x.shadowBlur=48;x.shadowColor='#ff304f';x.fillStyle='#17060c';poly(44,14,t*.18);x.fill();x.strokeStyle='#8e1530';x.lineWidth=3;x.stroke();x.fillStyle='#ff5964';x.beginPath();x.arc(-12,-7,5,0,T);x.arc(12,-7,5,0,T);x.fill();x.restore()}noxy();lumo();parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l);x.fillStyle=p.c;x.shadowBlur=9;x.shadowColor=p.c;x.fillRect(p.x,p.y,4,4)});x.shadowBlur=0;x.globalAlpha=1;let vg=x.createRadialGradient(W/2,H/2,Math.min(W,H)*.25,W/2,H/2,Math.max(W,H)*.72);vg.addColorStop(.55,'transparent');vg.addColorStop(1,'#000b');x.fillStyle=vg;x.fillRect(0,0,W,H)}function loop(n){if(!run)return;let dt=Math.min(.033,(n-last)/1000);last=n;update(dt);draw();requestAnimationFrame(loop)}function hold(id,key){let e=document.getElementById(id);e.onpointerdown=a=>{a.preventDefault();K[key]=1};e.onpointerup=e.onpointercancel=e.onpointerleave=()=>K[key]=0}hold('left','l');hold('right','r');jump.onpointerdown=e=>{e.preventDefault();jumpNow()};burst.onpointerdown=e=>{e.preventDefault();sun()};play.onclick=()=>{init();menu.classList.add('hidden');run=1;last=performance.now();requestAnimationFrame(loop)};onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')K.l=1;if(e.key==='ArrowRight'||e.key==='d')K.r=1;if(e.key==='ArrowUp'||e.key==='w'||e.key===' ')jumpNow();if(e.key==='e'||e.key==='Enter')sun()};onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')K.l=0;if(e.key==='ArrowRight'||e.key==='d')K.r=0};onresize=resize;resize();init();draw();</script></body></html>
